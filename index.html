<!doctype html>
<html lang="fr">



<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />  <!-- Rend la page responsive : la largeur s'adapte à l'écran (mobile, tablette, PC) -->
  <title>Trombinoscope — Personnage d'anmé/manga</title>
  <meta name="description" content="Mini-projet Git/GitHub : Trombinoscope de la classe. Chaque élève complète ses infos dans le JavaScript." />
  <link rel="stylesheet" href="style.css">
  <script src="script.js" defer></script>
</head>


<body>
  <div class="container">
    <header class="hero">
      <div class="title"> Trombinoscope — Personnage d'animé/manga</div>
      <!-- Carte/panneau contenant la barre de recherche -->
      <div class="panel">
        <div class="controls">
          <label class="search" aria-label="Rechercher par nom, techno ou rôle"> <!-- Champ de recherche : filtre les fiches en direct (voir script.js -> filter()) -->
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M21 21l-4.2-4.2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              <circle cx="10" cy="10" r="6" stroke="currentColor" stroke-width="2"/>
            </svg>
            <input id="q" type="search" placeholder="Rechercher un(e) camarade ou une techno…" autocomplete="off" />
          </label>
        </div>
      </div>


    </header>
    <main id="list" class="grid" aria-live="polite"></main>
    <!-- Message affiché uniquement si la recherche ne donne aucun résultat.
         "hidden" le cache par défaut ; script.js retire/ajoute cet attribut selon le nombre de résultats. -->
    <p id="empty" class="empty" hidden>Aucune personne ne correspond à cette recherche.</p>
    <footer>
      <p>
        Trombinoscope réalisé par  <span class="kbd">Enzo LETHIAIS</span> pour présenter différents personnages issues d'animés/mangas
      </p>
    </footer>
  </div>
</body>


</html>
