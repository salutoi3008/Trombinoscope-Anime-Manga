<!doctype html>
<html lang="fr">


<head>
  <meta charset="utf-8" />
 
  <meta name="viewport" content="width=device-width, initial-scale=1" />  <!-- Rend la page responsive : la largeur s'adapte à l'écran (mobile, tablette, PC) -->
  <title>Trombinoscope — BTS CIEL 1er année</title>
  <link rel="stylesheet" href="style.css">  <!-- Feuille de style : toutes les couleurs, tailles, mises en page -->
  <script src="script.js" defer></script> 

</head>



<body>
  
  <div class="container"><!-- Conteneur principal : centre le contenu et limite sa largeur (voir .container en CSS) -->
    <header class="hero"><!-- En-tête de la page : titre + barre de recherche + bouton thème -->
      <div class="title">Trombinoscope — Pesonnages animé/manga</div>


      <!-- Carte/panneau contenant la barre de recherche -->
      <div class="panel">
        <div class="controls">


          <label class="search" aria-label="Rechercher par nom, techno ou rôle">  <!-- Champ de recherche -->
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true"><!-- Icône loupe -->
              <path d="M21 21l-4.2-4.2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              <circle cx="10" cy="10" r="6" stroke="currentColor" stroke-width="2"/>
            </svg>
            <input id="q" type="search" placeholder="Rechercher un(e) camarade ou une technique…" autocomplete="off" />
          </label>


      <!-- Bouton pour basculer entre thème clair/sombre (logique dans script.js) -->
      <button id="themeToggle" aria-label="Changer de thème">🌙</button>

    </header>
    <main id="list" class="grid" aria-live="polite"></main>




    <!-- Message affiché uniquement si la recherche ne donne aucun résultat."hidden" le cache par défaut. -->
    <p id="empty" class="empty" hidden>Aucune personne ne correspond à cette recherche.</p>
  </div>
</body>
</html>
